server:
  port: 8080

spring:
  application:
    name: book-service
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:bookdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.bookservice.entity
  configuration:
    map-underscore-to-camel-case: true
    # 使用 SLF4J，与 Logback 统一，便于集中管理日志
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
